<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Bugema Academic Connect</title>
    <link rel="stylesheet" href="/css/all.min.css">
    <link rel="stylesheet" href="/css/inter.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="manifest" href="/manifest.json">
    <script src="/js/dark-mode.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .offline-card {
            background: white;
            border-radius: 16px;
            padding: 48px 40px;
            text-align: center;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .offline-card .icon {
            font-size: 64px;
            color: #f59e0b;
            margin-bottom: 24px;
        }
        .offline-card h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 12px;
        }
        .offline-card p {
            font-size: 15px;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 28px;
        }
        .offline-card .btn {
            display: inline-block;
            padding: 12px 32px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .offline-card .btn:hover { background: #1d4ed8; }
        .offline-card .hint {
            margin-top: 20px;
            font-size: 13px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="icon"><i class="fas fa-wifi-slash"></i></div>
        <h1>You're Offline</h1>
        <p>Your internet connection appears to be down. Don't worry — your cached messages and data are still available.</p>
        <a class="btn" onclick="window.location.reload()"><i class="fas fa-sync-alt me-2"></i> Try Again</a>
        <div class="hint">
            <i class="fas fa-info-circle"></i> Some features may be limited until you reconnect.
        </div>
    </div>
    <script src="/js/offline.js"></script>
</body>
</html>
