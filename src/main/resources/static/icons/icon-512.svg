<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a66c2"/>
      <stop offset="100%" stop-color="#05428a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>
  <g transform="translate(256,256)" fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round">
    <!-- Graduation cap -->
    <path d="M-160,-30 L0,-120 L160,-30 L0,60 Z" stroke-width="12" fill="rgba(255,255,255,0.15)"/>
    <path d="M-160,-30 L0,-120 L160,-30" stroke-width="12"/>
    <path d="M-160,-30 L0,60 L160,-30" stroke-width="12" fill="rgba(255,255,255,0.1)"/>
    <!-- Tassel -->
    <path d="M0,-120 L0,-160" stroke-width="8"/>
    <circle cx="0" cy="-170" r="10" fill="#fff"/>
    <!-- Open book below -->
    <rect x="-90" y="60" width="180" height="100" rx="8" stroke-width="10" fill="rgba(255,255,255,0.1)"/>
    <line x1="-90" y1="110" x2="90" y2="110" stroke-width="5"/>
    <!-- Book spine -->
    <line x1="0" y1="60" x2="0" y2="160" stroke-width="8"/>
  </g>
</svg>
