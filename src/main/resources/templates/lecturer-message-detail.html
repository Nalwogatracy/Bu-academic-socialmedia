<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bugema Connect | Chat with <span th:text="${other.fullName}"></span></title>
    <link rel="stylesheet" th:href="@{/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/css/inter.css}">
    <!-- Custom theme system (dark mode) -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Dark mode toggle script -->
    <script th:src="@{/js/dark-mode.js}"></script>
    <style>
        /* Same CSS as lecturer-messages.html - copy the complete styles from there */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #e5ddd5;
            height: 100vh;
            overflow: hidden;
        }

        /* Navbar - Light Theme */
        .navbar {
            background: #075e54;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .nav-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 20px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            color: white;
            font-size: 1.5rem;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            transition: all 0.2s;
            position: relative;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.15);
            color: white;
        }

        .badge {
            position: absolute;
            top: 4px;
            right: 4px;
            background: #25D366;
            color: #075e54;
            font-size: 0.6rem;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            border: 2px solid #075e54;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            overflow: hidden;
            cursor: pointer;
        }

        .logout-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        /* Main Container */
        .wa-container {
            max-width: 1500px;
            margin: 60px auto 0;
            height: calc(100vh - 60px);
            display: flex;
            background: #f0f2f5;
            overflow: hidden;
        }

        /* Sidebar - Light Theme */
        .chats-sidebar {
            width: 380px;
            background: white;
            border-right: 1px solid #e9edef;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .chats-header {
            background: #f0f2f5;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e9edef;
        }

        .profile-preview {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chats-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #25D366;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            overflow: hidden;
        }

        .chats-user-info h3 {
            font-size: 1rem;
            font-weight: 600;
            color: #111b21;
        }

        .chats-user-info p {
            font-size: 0.7rem;
            color: #667781;
        }

        .header-icons {
            display: flex;
            gap: 12px;
            color: #54656f;
        }

        .header-icons i {
            font-size: 1.2rem;
            cursor: pointer;
        }

        .search-section {
            background: white;
            padding: 8px 12px;
        }

        .search-box-wa {
            background: #f0f2f5;
            border-radius: 8px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #667781;
        }

        .search-input-wa {
            background: transparent;
            border: none;
            width: 100%;
            color: #111b21;
            font-size: 0.9rem;
            outline: none;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            background: white;
        }

        .conversation-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid #f0f2f5;
            text-decoration: none;
        }

        .conversation-item:hover {
            background: #f5f6f6;
        }

        .conversation-item.active {
            background: #e9f0eb;
        }

        .contact-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #25D366;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            position: relative;
            flex-shrink: 0;
            overflow: hidden;
        }

        .online-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #25D366;
            border: 2px solid white;
            border-radius: 50%;
        }

        .contact-info {
            flex: 1;
            min-width: 0;
        }

        .contact-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 4px;
        }

        .contact-name {
            font-weight: 500;
            color: #111b21;
            font-size: 1rem;
        }

        .message-time {
            font-size: 0.7rem;
            color: #8696a0;
        }

        .message-preview {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #667781;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .unread-badge-wa {
            background: #25D366;
            color: #075e54;
            font-weight: 700;
            font-size: 0.7rem;
            min-width: 20px;
            height: 20px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            margin-left: 6px;
        }

        /* Chat Window */
        .chat-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #efeae2;
            position: relative;
        }

        .chat-window-header {
            background: #f0f2f5;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 1px solid #e9edef;
        }

        .chat-target-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .target-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #25D366;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .target-details h4 {
            color: #111b21;
            font-size: 1rem;
            font-weight: 500;
        }

        .target-status {
            font-size: 0.7rem;
            color: #667781;
        }

        .chat-actions-wa {
            display: flex;
            gap: 16px;
            color: #54656f;
        }

        .chat-actions-wa i {
            cursor: pointer;
            font-size: 1.2rem;
        }

        .messages-pane {
            flex: 1;
            overflow-y: auto;
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-image: radial-gradient(circle at 10% 30%, rgba(0,0,0,0.02) 1.5px, transparent 1px);
            background-size: 20px 20px;
        }

        .msg-row {
            display: flex;
            margin: 4px 0;
        }

        .msg-row.sent {
            justify-content: flex-end;
        }

        .msg-row.received {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.4;
            word-wrap: break-word;
            box-shadow: 0 1px 0.5px rgba(0,0,0,0.08);
        }

        .sent .bubble {
            background: #d9fdd3;
            color: #111b21;
            border-top-right-radius: 4px;
        }

        .received .bubble {
            background: white;
            color: #111b21;
            border-top-left-radius: 4px;
        }

        .message-meta-wa {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            margin-top: 4px;
            font-size: 0.65rem;
            color: #667781;
        }

        .double-tick {
            font-size: 0.7rem;
        }

        .double-tick.read {
            color: #53bdeb;
        }

        .typing-wa {
            background: white;
            border-radius: 16px;
            padding: 8px 14px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            width: fit-content;
            margin-bottom: 8px;
            box-shadow: 0 1px 0.5px rgba(0,0,0,0.08);
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: #8696a0;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        .input-area {
            background: #f0f2f5;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 1px solid #e9edef;
        }

        .input-icon-btn {
            background: transparent;
            border: none;
            color: #54656f;
            font-size: 1.3rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: 0.2s;
        }

        .input-icon-btn:hover {
            background: #e0e4e9;
        }

        .message-input-wa {
            flex: 1;
            background: white;
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            color: #111b21;
            font-size: 0.95rem;
            outline: none;
        }

        .send-btn-wa {
            background: #075e54;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .send-btn-wa:disabled {
            background: #ced0d1;
            cursor: default;
        }

        .emoji-panel {
            position: absolute;
            bottom: 80px;
            left: 20px;
            background: white;
            border-radius: 16px;
            padding: 12px;
            display: none;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
            z-index: 200;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            max-width: 320px;
        }

        .emoji-panel.show {
            display: grid;
        }

        .emoji-item {
            font-size: 1.3rem;
            cursor: pointer;
            text-align: center;
            padding: 6px;
            border-radius: 8px;
            transition: 0.1s;
        }

        .emoji-item:hover {
            background: #f0f2f5;
            transform: scale(1.1);
        }

        .back-chats-btn {
            display: none;
            margin-right: 10px;
            background: transparent;
            border: none;
            color: #075e54;
            font-size: 1.2rem;
            cursor: pointer;
        }

        @media (max-width: 780px) {
            .chats-sidebar {
                width: 100%;
                position: absolute;
                left: -100%;
                z-index: 1100;
                transition: left 0.2s;
                height: calc(100vh - 60px);
            }
            .chats-sidebar.mobile-open {
                left: 0;
            }
            .chat-window {
                width: 100%;
            }
            .back-chats-btn {
                display: block;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e0;
            border-radius: 6px;
        }
    </style>
    <link rel="manifest" href="/manifest.json">
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <div class="logo">
            <i class="fas fa-chalkboard-user"></i>
            <span>Bugema Connect | Lecturer</span>
        </div>
        <div class="nav-right">
            <a class="nav-item" th:href="@{/lecturer/dashboard}"><i class="fas fa-home"></i></a>
            <a class="nav-item active" th:href="@{/lecturer/messages}"><i class="fas fa-comment"></i><span class="badge" th:if="${unreadMessages > 0}" th:text="${unreadMessages}">2</span></a>
            <a class="nav-item" th:href="@{/lecturer/notifications}"><i class="fas fa-bell"></i><span class="badge" th:if="${unreadNotifications > 0}" th:text="${unreadNotifications}">3</span></a>
            <button class="nav-dark-toggle" title="Toggle dark mode"><i class="fas fa-moon dark-toggle-icon"></i></button>
            <div class="user-avatar">
                <img th:if="${user.profilePicture != null}" th:src="@{/user/profile-picture/{id}(id=${user.id})}" style="width:100%; height:100%; object-fit:cover;">
                <span th:if="${user.profilePicture == null}" th:text="${#strings.substring(user.fullName,0,2)}">JD</span>
            </div>
            <form th:action="@{/logout}" method="post"><button class="logout-btn" type="submit"><i class="fas fa-sign-out-alt"></i></button></form>
        </div>
    </div>
</nav>

<div class="wa-container">
    <div class="chats-sidebar" id="chatsSidebar">
        <div class="chats-header">
            <div class="profile-preview">
                <div class="chats-avatar">
                    <img th:if="${user.profilePicture != null}" th:src="@{/user/profile-picture/{id}(id=${user.id})}">
                    <span th:if="${user.profilePicture == null}" th:text="${#strings.substring(user.fullName,0,2)}">ME</span>
                </div>
                <div class="chats-user-info">
                    <h3 th:text="${user.fullName}">Lecturer Name</h3>
                    <p>Bugema University</p>
                </div>
            </div>
            <div class="header-icons">
                <a th:href="@{/lecturer/messages/new}" style="color: #54656f;"><i class="fas fa-edit"></i></a>
                <i class="fas fa-ellipsis-v"></i>
            </div>
        </div>
        
        <div class="search-section">
            <div class="search-box-wa">
                <i class="fas fa-search"></i>
                <input type="text" class="search-input-wa" id="globalSearchPeople" placeholder="Search name or message...">
            </div>
        </div>
        
        <div class="chats-list" id="allChatsList">
            <div th:each="conv : ${conversations}" th:with="lastMsg=${conv.value != null && !conv.value.isEmpty() ? conv.value[0] : null}"
                 class="conversation-item" th:classappend="${conv.key.id == other.id} ? 'active' : ''"
                 th:attr="data-user-id=${conv.key.id}">
                <div class="contact-avatar">
                    <span th:if="${conv.key.profilePicture == null}" th:text="${#strings.substring(conv.key.fullName,0,2)}">JD</span>
                    <img th:if="${conv.key.profilePicture != null}" th:src="@{/user/profile-picture/{id}(id=${conv.key.id})}" style="width:100%; height:100%; object-fit:cover;">
                </div>
                <div class="contact-info">
                    <div class="contact-row">
                        <span class="contact-name" th:text="${conv.key.fullName}">Student Name</span>
                        <span class="message-time" th:if="${lastMsg != null}" th:text="${#temporals.format(lastMsg.sentAt, 'HH:mm')}">14:30</span>
                    </div>
                    <div class="message-preview">
                        <span th:if="${lastMsg != null}" th:text="${lastMsg.sender.id == user.id ? 'You: ' + lastMsg.content : lastMsg.content}">Last message</span>
                        <span th:if="${lastMsg == null}">Tap to start chatting</span>
                        <span class="unread-badge-wa" th:if="${(unreadPerUser[conv.key.id] ?: 0) > 0}" th:text="${unreadPerUser[conv.key.id] ?: 0}"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="chat-window">
        <div class="chat-window-header">
            <div style="display:flex; align-items:center;">
                <button class="back-chats-btn" id="mobileBackBtn" onclick="closeMobileSidebar()"><i class="fas fa-arrow-left"></i></button>
                <div class="chat-target-info">
                    <div class="target-avatar">
                        <img th:if="${other.profilePicture != null}" th:src="@{/user/profile-picture/{id}(id=${other.id})}" style="width:100%;height:100%;object-fit:cover;">
                        <span th:if="${other.profilePicture == null}" th:text="${#strings.substring(other.fullName,0,2)}">ST</span>
                    </div>
                    <div class="target-details">
                        <h4 th:text="${other.fullName}">Student Name</h4>
                        <div class="target-status">
                            <span>Student</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="chat-actions-wa">
                <i class="fas fa-search"></i>
                <i class="fas fa-ellipsis-v"></i>
            </div>
        </div>
        
        <div class="messages-pane" id="messagesPane">
            <div th:each="msg : ${messages}" th:classappend="${msg.sender.id == user.id} ? 'msg-row sent' : 'msg-row received'">
                <div class="bubble">
                    <div class="message-text" th:text="${msg.content}">Hello</div>
                    <div class="message-meta-wa">
                        <span th:text="${#temporals.format(msg.sentAt, 'HH:mm')}">14:30</span>
                        <span class="double-tick" th:if="${msg.sender.id == user.id}">
                            <span th:if="${!msg.delivered and !msg.read}"><i class="fas fa-check"></i></span>
                            <span th:if="${msg.delivered and !msg.read}"><i class="fas fa-check"></i><i class="fas fa-check"></i></span>
                            <span th:if="${msg.read}" style="color:#53bdeb;"><i class="fas fa-check"></i><i class="fas fa-check"></i></span>
                        </span>
                    </div>
                </div>
            </div>
            <div id="typingArea" style="display:none;">
                <div class="typing-wa">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <span style="margin-left:6px; font-size:0.75rem;">typing...</span>
                </div>
            </div>
        </div>
        
        <div class="input-area">
            <button class="input-icon-btn" id="emojiButtonWA" type="button"><i class="far fa-smile-wink"></i></button>
            <div id="emojiPanelWA" class="emoji-panel">
                <span class="emoji-item" onclick="insertEmoji('😊')">😊</span>
                <span class="emoji-item" onclick="insertEmoji('😂')">😂</span>
                <span class="emoji-item" onclick="insertEmoji('❤️')">❤️</span>
                <span class="emoji-item" onclick="insertEmoji('👍')">👍</span>
                <span class="emoji-item" onclick="insertEmoji('🔥')">🔥</span>
                <span class="emoji-item" onclick="insertEmoji('🎉')">🎉</span>
                <span class="emoji-item" onclick="insertEmoji('✅')">✅</span>
                <span class="emoji-item" onclick="insertEmoji('🙏')">🙏</span>
                <span class="emoji-item" onclick="insertEmoji('🤝')">🤝</span>
                <span class="emoji-item" onclick="insertEmoji('💬')">💬</span>
                <span class="emoji-item" onclick="insertEmoji('📚')">📚</span>
                <span class="emoji-item" onclick="insertEmoji('☕')">☕</span>
                <span class="emoji-item" onclick="insertEmoji('😍')">😍</span>
                <span class="emoji-item" onclick="insertEmoji('🥳')">🥳</span>
                <span class="emoji-item" onclick="insertEmoji('😎')">😎</span>
                <span class="emoji-item" onclick="insertEmoji('💯')">💯</span>
                <span class="emoji-item" onclick="insertEmoji('🙌')">🙌</span>
                <span class="emoji-item" onclick="insertEmoji('👏')">👏</span>
                <span class="emoji-item" onclick="insertEmoji('💪')">💪</span>
                <span class="emoji-item" onclick="insertEmoji('🎓')">🎓</span>
                <span class="emoji-item" onclick="insertEmoji('📖')">📖</span>
                <span class="emoji-item" onclick="insertEmoji('🏆')">🏆</span>
                <span class="emoji-item" onclick="insertEmoji('⭐')">⭐</span>
                <span class="emoji-item" onclick="insertEmoji('💡')">💡</span>
            </div>
            <input type="text" class="message-input-wa" id="waMessageInput" placeholder="Type a message" autocomplete="off">
            <button class="send-btn-wa" id="waSendBtn" disabled><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    let currentUserId = /*[[${user.id}]]*/ 0;
    let currentChatUserId = /*[[${other.id}]]*/ null;
    let eventSourceWa = null;
    let typingTimeout;
    let lastTypingSent = 0;

    function connectSSE() {
        if(eventSourceWa) eventSourceWa.close();
        eventSourceWa = new EventSource('/sse/stream');
        eventSourceWa.addEventListener('notification', e => {
            const data = JSON.parse(e.data);
            if(data.title === 'New Message' && data.senderId == currentChatUserId) {
                refreshMessages();
            } else if(data.title === 'New Message') {
                location.reload();
            }
        });
        eventSourceWa.addEventListener('typing', e => {
            const data = JSON.parse(e.data);
            if(data.senderId == currentChatUserId && data.senderId != currentUserId) {
                showTyping();
            }
        });
        eventSourceWa.onerror = () => setTimeout(connectSSE, 3000);
    }

    function refreshMessages() {
        if(!currentChatUserId) return;
        fetch('/lecturer/messages/' + currentChatUserId + '/refresh')
            .then(r => r.text())
            .then(html => {
                document.getElementById('messagesPane').innerHTML = html;
                scrollToBottom();
                markRead();
            })
            .catch(e => console.log);
    }
    
    function scrollToBottom() {
        const pane = document.getElementById('messagesPane');
        if(pane) pane.scrollTop = pane.scrollHeight;
    }
    
    function markRead() {
        if(currentChatUserId) {
            fetch('/lecturer/messages/' + currentChatUserId + '/read', {method: 'POST'})
                .catch(e => console.log);
        }
    }
    
    function showTyping() {
        const typingDiv = document.getElementById('typingArea');
        if(typingDiv) {
            typingDiv.style.display = 'block';
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => typingDiv.style.display = 'none', 3000);
        }
    }
    
    function sendTyping() {
        if(!currentChatUserId) return;
        const now = Date.now();
        if(now - lastTypingSent < 2000) return;
        lastTypingSent = now;
        fetch('/lecturer/messages/typing', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({recipientId: currentChatUserId})
        }).catch(e => console.log);
    }

    function insertEmoji(emoji) {
        const input = document.getElementById('waMessageInput');
        if(input) {
            const start = input.selectionStart;
            const val = input.value;
            input.value = val.substring(0, start) + emoji + val.substring(start);
            input.focus();
            toggleSendBtn();
        }
        document.getElementById('emojiPanelWA')?.classList.remove('show');
    }

    function toggleSendBtn() {
        const input = document.getElementById('waMessageInput');
        const btn = document.getElementById('waSendBtn');
        if(btn && input) btn.disabled = !input.value.trim();
    }

    function closeMobileSidebar() {
        document.getElementById('chatsSidebar')?.classList.remove('mobile-open');
    }

    document.addEventListener('DOMContentLoaded', () => {
        connectSSE();
        scrollToBottom();
        markRead();
        
        document.getElementById('allChatsList').addEventListener('click', function(e) {
            const item = e.target.closest('[data-user-id]');
            if(item) {
                window.location.href = '/lecturer/messages/' + item.getAttribute('data-user-id');
            }
        });
        
        const sendBtn = document.getElementById('waSendBtn');
        const msgInput = document.getElementById('waMessageInput');
        
        if(sendBtn && msgInput && currentChatUserId) {
            const sendMessage = () => {
                const content = msgInput.value.trim();
                if(!content) return;
                const formData = new URLSearchParams();
                formData.append('recipientId', currentChatUserId);
                formData.append('content', content);
                formData.append('subject', 'Message');
                fetch('/lecturer/messages/send', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: formData
                }).then(res => {
                    if(res.redirected) window.location.href = res.url;
                    else refreshMessages();
                    msgInput.value = '';
                    toggleSendBtn();
                }).catch(err => console.log);
            };
            sendBtn.onclick = sendMessage;
            msgInput.addEventListener('keypress', e => {
                if(e.key === 'Enter' && !e.shiftKey && !sendBtn.disabled) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            msgInput.addEventListener('input', () => {
                toggleSendBtn();
                sendTyping();
            });
        }
        
        const emojiBtn = document.getElementById('emojiButtonWA');
        const emojiPanel = document.getElementById('emojiPanelWA');
        if(emojiBtn && emojiPanel) {
            emojiBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                emojiPanel.classList.toggle('show');
            });
            document.addEventListener('click', (e) => {
                if(!emojiPanel.contains(e.target) && !emojiBtn.contains(e.target)) {
                    emojiPanel.classList.remove('show');
                }
            });
        }
        
        const searchInput = document.getElementById('globalSearchPeople');
        if(searchInput) {
            searchInput.addEventListener('input', function() {
                const term = this.value.toLowerCase();
                document.querySelectorAll('.conversation-item').forEach(el => {
                    const name = el.querySelector('.contact-name')?.innerText.toLowerCase() || '';
                    const preview = el.querySelector('.message-preview')?.innerText.toLowerCase() || '';
                    el.style.display = (name.includes(term) || preview.includes(term)) ? 'flex' : 'none';
                });
            });
        }
        
        const observer = new MutationObserver(() => scrollToBottom());
        const messagesPane = document.getElementById('messagesPane');
        if(messagesPane) observer.observe(messagesPane, { childList: true, subtree: true });
    });
    
    window.closeMobileSidebar = closeMobileSidebar;
</script>
    <script src="/js/offline.js"></script>
</body>
</html>
