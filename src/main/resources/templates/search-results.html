<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Search: ' + ${query} + ' | Bugema Academic Connect'">Search - Bugema Academic Connect</title>
    <link rel="stylesheet" th:href="@{/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/css/inter.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/js/dark-mode.js}"></script>
    <link rel="manifest" href="/manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f0f2f5; min-height: 100vh; }
        .nav-container {
            position: fixed; top: 0; left: 0; right: 0; height: 64px;
            background: white; border-bottom: 1px solid #e0e3e8;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .nav-left { display: flex; align-items: center; gap: 20px; flex: 1; }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.15rem; color: #0a66c2; white-space: nowrap; }
        .logo i { font-size: 1.4rem; }
        .search-bar { display: flex; align-items: center; background: #f0f2f5; border-radius: 24px; padding: 8px 16px; flex: 1; max-width: 520px; }
        .search-bar i { color: #64748b; margin-right: 10px; font-size: 0.9rem; }
        .search-bar input { border: none; background: none; outline: none; font-size: 0.9rem; width: 100%; color: #1e293b; }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .nav-item { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; color: #475569; text-decoration: none; transition: all 0.2s; position: relative; }
        .nav-item:hover { background: #f0f2f5; color: #0a66c2; }
        .badge { position: absolute; top: 2px; right: 2px; background: #ef4444; color: white; font-size: 0.6rem; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center; justify-content: center; padding: 0 4px; }
        .dashboard-link { padding: 8px 16px; background: #f0f2f5; border-radius: 8px; color: #475569; text-decoration: none; font-size: 0.85rem; font-weight: 500; transition: all 0.2s; }
        .dashboard-link:hover { background: #e2e8f0; color: #0a66c2; }
        .container { max-width: 900px; margin: 88px auto 40px; padding: 0 20px; }
        .result-section { background: white; border-radius: 12px; padding: 20px 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
        .result-section h3 { font-size: 1rem; font-weight: 600; color: #1e293b; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .result-section h3 i { color: #0a66c2; }
        .result-section h3 span { background: #f1f5f9; color: #64748b; font-size: 0.75rem; font-weight: 500; padding: 2px 10px; border-radius: 12px; }
        .result-item { display: flex; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
        .result-item:last-child { border-bottom: none; }
        .result-avatar { width: 44px; height: 44px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-weight: 600; color: #475569; flex-shrink: 0; overflow: hidden; }
        .result-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .result-info { flex: 1; min-width: 0; }
        .result-name { font-weight: 600; font-size: 0.9rem; color: #1e293b; }
        .result-name a { color: #1e293b; text-decoration: none; }
        .result-name a:hover { color: #0a66c2; }
        .result-meta { font-size: 0.8rem; color: #64748b; margin-top: 2px; }
        .result-badge { font-size: 0.7rem; padding: 2px 10px; border-radius: 12px; font-weight: 500; }
        .result-badge.student { background: #dbeafe; color: #1d4ed8; }
        .result-badge.lecturer { background: #fef3c7; color: #d97706; }
        .result-badge.admin { background: #fce7f3; color: #db2777; }
        .empty-state { text-align: center; padding: 48px 20px; color: #94a3b8; }
        .empty-state i { font-size: 3rem; margin-bottom: 16px; display: block; }
        .empty-state p { font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="nav-container">
        <div class="nav-left">
            <div class="logo"><i class="fas fa-graduation-cap"></i><span>Bugema Connect</span></div>
            <form class="search-bar" th:action="@{/search}" method="get" style="display:flex;">
                <i class="fas fa-search"></i>
                <input type="text" name="q" th:value="${query}" placeholder="Search courses, people, messages..." autofocus>
            </form>
        </div>
        <div class="nav-right">
            <a class="dashboard-link" th:href="@{/${role}/dashboard}"><i class="fas fa-arrow-left"></i> Dashboard</a>
            <a class="nav-item" th:href="@{/${role}/messages}"><i class="fas fa-comment"></i><span class="badge" th:if="${unreadMessages > 0}" th:text="${unreadMessages}">0</span></a>
            <a class="nav-item" th:href="@{/${role}/notifications}"><i class="fas fa-bell"></i><span class="badge" th:if="${unreadNotifications > 0}" th:text="${unreadNotifications}">0</span></a>
        </div>
    </div>

    <div class="container">
        <div th:if="${results.total == 0}" class="empty-state">
            <i class="fas fa-search"></i>
            <h3 style="font-size:1.1rem;color:#475569;margin-bottom:8px;">No results found</h3>
            <p>No results match <strong th:text="${query}">your query</strong>. Try different keywords.</p>
        </div>

        <!-- Users -->
        <div class="result-section" th:if="${!#lists.isEmpty(results.users)}">
            <h3><i class="fas fa-users"></i> People <span th:text="${#lists.size(results.users)}">0</span></h3>
            <div th:each="u : ${results.users}" class="result-item">
                <div class="result-avatar">
                    <img th:if="${u.profilePicture != null}" th:src="@{/user/profile-picture/{id}(id=${u.id})}" alt="">
                    <span th:if="${u.profilePicture == null}" th:text="${#strings.substring(u.fullName, 0, 2)}">NT</span>
                </div>
                <div class="result-info">
                    <div class="result-name">
                        <a th:href="@{/${role}/messages/{id}(id=${u.id})}" th:text="${u.fullName}">Name</a>
                    </div>
                    <div class="result-meta">
                        <span th:text="${u.email}">email</span>
                        <span th:if="${u.universityId != null}" th:text="' · ' + ${u.universityId}"></span>
                        <span class="result-badge" th:classappend="${#strings.toLowerCase(u.role)}" th:text="${u.role}">STUDENT</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Courses -->
        <div class="result-section" th:if="${!#lists.isEmpty(results.courses)}">
            <h3><i class="fas fa-book"></i> Courses <span th:text="${#lists.size(results.courses)}">0</span></h3>
            <div th:each="c : ${results.courses}" class="result-item">
                <div class="result-avatar" style="border-radius:10px;background:#dbeafe;color:#1d4ed8;">
                    <i class="fas fa-book-open"></i>
                </div>
                <div class="result-info">
                    <div class="result-name">
                        <a th:href="@{/${role}/course/{id}(id=${c.id})}" th:text="${c.name}">Course Name</a>
                    </div>
                    <div class="result-meta">
                        <span th:text="${c.code}">CODE</span>
                        <span th:if="${c.department != null}" th:text="' · ' + ${c.department}"></span>
                        <span th:if="${c.lecturer != null}" th:text="' · ' + ${c.lecturer.fullName}"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Messages -->
        <div class="result-section" th:if="${!#lists.isEmpty(results.messages)}">
            <h3><i class="fas fa-comments"></i> Messages <span th:text="${#lists.size(results.messages)}">0</span></h3>
            <div th:each="m : ${results.messages}" class="result-item">
                <div class="result-avatar">
                    <img th:if="${m.sender.profilePicture != null}" th:src="@{/user/profile-picture/{id}(id=${m.sender.id})}" alt="">
                    <span th:if="${m.sender.profilePicture == null}" th:text="${#strings.substring(m.sender.fullName, 0, 2)}">NT</span>
                </div>
                <div class="result-info">
                    <div class="result-name">
                        <a th:href="@{/${role}/messages/{id}(id=${m.sender.id})}" th:text="${m.sender.fullName}">Sender</a>
                    </div>
                    <div class="result-meta">
                        <span th:text="${#strings.abbreviate(m.content, 120)}">message preview</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/offline.js}"></script>
</body>
</html>
